name: Deploy â€” Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # never cancel a prod deploy mid-flight

jobs:
  deploy:
    name: Build & deploy to production
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      SERVICE: anchor-prod
      IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/anchor/app

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe anchor \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create anchor \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Build and push Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Run database migrations
        run: |
          gcloud run jobs delete migrate-prod --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --quiet 2>/dev/null || true
          gcloud run jobs create migrate-prod \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --set-env-vars="RAILS_ENV=production" \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL_PROD }}" \
            --set-env-vars="SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}" \
            --command="/rails/bin/rails" \
            --args="db:migrate" \
            --execute-now

      - name: Deploy web to Cloud Run (production)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --cpu=1 \
            --cpu-throttling \
            --no-cpu-boost \
            --port=8080 \
            --set-env-vars="RAILS_ENV=production" \
            --set-env-vars="RAILS_LOG_TO_STDOUT=true" \
            --set-env-vars="RAILS_SERVE_STATIC_FILES=true" \
            --set-env-vars="REDIS_URL=${{ secrets.REDIS_URL_PROD }}" \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL_PROD }}" \
            --set-env-vars="ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" \
            --set-env-vars="SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}" \
            --set-env-vars="GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}" \
            --set-env-vars="GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}" \
            --set-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"

      - name: Deploy Sidekiq worker to Cloud Run (production)
        run: |
          gcloud run deploy anchor-worker \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --min-instances=1 \
            --max-instances=1 \
            --memory=1Gi \
            --cpu=1 \
            --cpu-always-allocated \
            --no-cpu-throttling \
            --command=bundle \
            --args=exec,sidekiq,-C,config/sidekiq.yml \
            --set-env-vars="RAILS_ENV=production" \
            --set-env-vars="RAILS_LOG_TO_STDOUT=true" \
            --set-env-vars="REDIS_URL=${{ secrets.REDIS_URL_PROD }}" \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL_PROD }}" \
            --set-env-vars="ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" \
            --set-env-vars="SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}" \
            --set-env-vars="GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}" \
            --set-env-vars="GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}" \
            --set-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"

      - name: Print production URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "Production: $URL"
